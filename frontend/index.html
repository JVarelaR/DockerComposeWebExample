<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Docker Compose</title>
  <style>
    /* Variables de diseño */
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --success: #22c55e;
      --error: #ef4444;
      --border: #334155;
    }

    /* Estilos globales */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Contenedor principal (Card) */
    .container {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.2;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Estado de la conexión */
    #status {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Pequeño indicador visual que cambia según el texto */
    #status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--success);
    }

    /* Cuando cambia el estado, cambia el color del indicador de forma dinámica */
    #status:contains("Consultando"), 
    body:has(#status:empty) #status::before { 
      background-color: var(--primary); 
    }

    /* El botón */
    button {
      width: 100%;
      background-color: var(--primary);
      color: #0f172a;
      border: none;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Contenedor de resultados */
    #result {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    #result p {
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    #result p:last-child {
      margin-bottom: 0;
    }

    /* Resaltar el número de visitas */
    #result strong {
      color: var(--primary);
      font-size: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Frontend + Backend</h1>
    <p id="status">Listo</p>
    
    <button id="load">Contar visita</button>
    
    <div id="result"></div>
  </div>

  <script>
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const load = document.getElementById('load');

    async function updateCount() {
      status.textContent = 'Consultando backend...';
      try {
        const res = await fetch('/api/visits');
        const json = await res.json();
        
        // Mejoré un poco la estructura semántica aquí con <strong> para que el diseño resalte el número
        result.innerHTML = `
          <p style="color: var(--text-muted);">${json.message}</p>
          <p>Visitas totales: <strong>${json.visits}</strong></p>
        `;
        status.textContent = 'Datos actualizados';
      } catch (err) {
        status.textContent = 'Error al conectar con el backend';
        result.innerHTML = `<p style="color: var(--error); font-size: 0.875rem;">${err}</p>`;
      }
    }

    load.addEventListener('click', updateCount);
    updateCount();
  </script>
</body>
</html>
