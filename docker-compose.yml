services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./web:/app
    depends_on:
      - redis

  redis:
    image: redis:7.0
    restart: always
